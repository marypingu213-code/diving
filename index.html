<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣海洋教育 - 潛水體驗與生物認知</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f0f9ff;
            overflow: hidden;
            margin: 0;
        }

        .ocean-bg {
            background: linear-gradient(180deg, #60a5fa 0%, #1d4ed8 100%);
            transition: all 1s ease-in-out;
        }

        .character-jump {
            animation: jump-dive 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* 貼近真實的拋物線跳水動作 */
        @keyframes jump-dive {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            30% { transform: translate(80px, -120px) scale(1.1) rotate(45deg); opacity: 1; }
            70% { transform: translate(160px, 100px) scale(0.9) rotate(135deg); opacity: 1; }
            100% { transform: translate(200px, 500px) scale(0.7) rotate(180deg); opacity: 0; }
        }

        .fish-swim {
            position: absolute;
            cursor: pointer;
            transition: filter 0.3s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        
        .fish-swim:hover {
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.9)) brightness(1.2);
            z-index: 55;
        }

        /* 由左至右游動並帶有上下起伏 */
        @keyframes swim-lr {
            0% { left: -20%; transform: translateY(0) scaleX(1); }
            50% { transform: translateY(30px) scaleX(1); }
            100% { left: 120%; transform: translateY(-20px) scaleX(1); }
        }

        /* 由右至左游動並帶有上下起伏 (使用 scaleX(-1) 讓魚頭轉向) */
        @keyframes swim-rl {
            0% { right: -20%; transform: translateY(0) scaleX(-1); }
            50% { transform: translateY(30px) scaleX(-1); }
            100% { right: 120%; transform: translateY(-20px) scaleX(-1); }
        }

        .modal-enter {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* SVG 裝備切換動畫 */
        .gear-layer {
            transition: opacity 0.4s ease-in-out;
        }
        
        /* 去除圖片棋盤格背景的混合模式 */
        .blend-layer {
            mix-blend-mode: multiply;
        }

        /* 針對觸控電視大螢幕的優化 */
        @media (min-width: 1024px) {
            .tv-scale-text { font-size: 1.25rem; line-height: 1.75rem; }
            .tv-scale-title { font-size: 3rem; line-height: 1; }
        }
    </style>
</head>
<body>

<div id="app" class="relative w-screen h-screen overflow-hidden flex items-center justify-center">
    
    <!-- 主場景：地圖與海洋 -->
    <div id="main-scene" class="relative w-full h-full flex items-center justify-center bg-blue-500 transition-all duration-1000">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-400 to-blue-700 opacity-90"></div>
        
        <!-- 台灣地圖容器 (針對電視與平板動態放大) -->
        <div id="map-container" class="relative z-10 w-[90%] sm:w-[70%] md:w-[60%] lg:w-[45%] xl:w-[35%] h-[80vh] flex items-center justify-center transition-transform duration-500 hover:scale-105">
            
            <!-- 加入載入失敗的防呆圖示 (地圖) -->
            <div id="map-fallback" class="absolute inset-0 flex flex-col items-center justify-center text-center hidden z-0 pointer-events-none">
                <span class="text-blue-200 font-bold bg-blue-900/50 px-4 py-2 rounded-xl shadow-sm border border-blue-300">地圖載入中...<br><span class="text-sm">(請確認 tw.svg 已放置於同資料夾)</span></span>
            </div>

            <!-- 
                ** 重要修改 ** 這裡將 src 修改為 "tw.svg"。
                請確保 tw.svg 檔案與此 HTML 檔案位於「同一個資料夾」內，地圖才能正常顯示。
            -->
            <img src="tw.svg" alt="台灣地圖" class="w-full h-full object-contain drop-shadow-2xl relative z-10" id="primary-map" 
                onerror="this.style.opacity='0'; document.getElementById('map-fallback').classList.remove('hidden');" 
                onload="this.style.opacity='1'; document.getElementById('map-fallback').classList.add('hidden');"/>
            
            <!-- 潛點標記 (因為 map-container 改為 h-[80vh]，所以標記同樣以百分比定位，會隨地圖大小自動縮放) -->
            <div class="absolute flex flex-col items-center cursor-pointer group" style="top: 26%; left: 78%; transform: translate(-50%, -50%); z-index: 20;" onclick="selectSpot('東北角')">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-red-500 rounded-full border-4 border-white shadow-lg group-hover:scale-125 transition-transform flex items-center justify-center">
                    <div class="w-full h-full bg-red-400 rounded-full animate-ping opacity-75"></div>
                </div>
                <span class="text-white font-bold text-sm lg:text-lg bg-blue-900/80 px-3 py-1 rounded-lg mt-2 whitespace-nowrap shadow-md">東北角</span>
            </div>
            
            <div class="absolute flex flex-col items-center cursor-pointer group" style="top: 80%; left: 76%; transform: translate(-50%, -50%); z-index: 20;" onclick="selectSpot('綠島')">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-red-500 rounded-full border-4 border-white shadow-lg group-hover:scale-125 transition-transform flex items-center justify-center">
                    <div class="w-full h-full bg-red-400 rounded-full animate-ping opacity-75"></div>
                </div>
                <span class="text-white font-bold text-sm lg:text-lg bg-blue-900/80 px-3 py-1 rounded-lg mt-2 whitespace-nowrap shadow-md">綠島</span>
            </div>
            
            <div class="absolute flex flex-col items-center cursor-pointer group" style="top: 92.5%; left: 78.5%; transform: translate(-50%, -50%); z-index: 20;" onclick="selectSpot('蘭嶼')">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-red-500 rounded-full border-4 border-white shadow-lg group-hover:scale-125 transition-transform flex items-center justify-center">
                    <div class="w-full h-full bg-red-400 rounded-full animate-ping opacity-75"></div>
                </div>
                <span class="text-white font-bold text-sm lg:text-lg bg-blue-900/80 px-3 py-1 rounded-lg mt-2 whitespace-nowrap shadow-md">蘭嶼</span>
            </div>
            
            <div class="absolute flex flex-col items-center cursor-pointer group" style="top: 94%; left: 64%; transform: translate(-50%, -50%); z-index: 20;" onclick="selectSpot('墾丁')">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-red-500 rounded-full border-4 border-white shadow-lg group-hover:scale-125 transition-transform flex items-center justify-center">
                    <div class="w-full h-full bg-red-400 rounded-full animate-ping opacity-75"></div>
                </div>
                <span class="text-white font-bold text-sm lg:text-lg bg-blue-900/80 px-3 py-1 rounded-lg mt-2 whitespace-nowrap shadow-md">墾丁</span>
            </div>
            
            <div class="absolute flex flex-col items-center cursor-pointer group" style="top: 84%; left: 56.5%; transform: translate(-50%, -50%); z-index: 20;" onclick="selectSpot('小琉球')">
                <div class="w-6 h-6 lg:w-8 lg:h-8 bg-red-500 rounded-full border-4 border-white shadow-lg group-hover:scale-125 transition-transform flex items-center justify-center">
                    <div class="w-full h-full bg-red-400 rounded-full animate-ping opacity-75"></div>
                </div>
                <span class="text-white font-bold text-sm lg:text-lg bg-blue-900/80 px-3 py-1 rounded-lg mt-2 whitespace-nowrap shadow-md">小琉球</span>
            </div>
        </div>

        <div class="absolute top-6 lg:top-12 text-center z-20">
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-white mb-4 drop-shadow-lg tracking-wide">台灣海洋教育地理資訊系統</h1>
            <p class="text-blue-900 font-bold bg-white/95 px-6 py-2 rounded-full shadow-lg text-lg lg:text-xl inline-block">請點選地圖上的紅點選擇潛水目的地</p>
        </div>
    </div>

    <!-- 角色選擇與換裝 UI (適應大電視放大版面) -->
    <div id="gear-modal" class="hidden fixed inset-0 z-30 bg-black/60 flex items-center justify-center p-4 lg:p-10">
        <div class="bg-white rounded-3xl p-6 md:p-8 lg:p-12 max-w-6xl w-full shadow-2xl modal-enter max-h-[95vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-6 lg:mb-10">
                <h2 id="selected-spot-name" class="text-3xl lg:text-4xl font-bold text-blue-700">準備前往：墾丁</h2>
                <button onclick="closeGearModal()" class="text-gray-400 hover:text-gray-600 text-4xl lg:text-5xl font-bold transition-colors">&times;</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                <!-- 角色大圖預覽區 (改用三張真實圖片切換) -->
                <div class="bg-blue-50/50 border-2 border-blue-100 rounded-3xl p-4 flex flex-col items-center justify-center relative min-h-[400px] lg:min-h-[500px]">
                    <div id="character-container" class="relative w-56 md:w-72 lg:w-96 h-full flex flex-col items-center justify-center transition-transform duration-300 drop-shadow-2xl">
                        
                        <!-- 加入載入失敗的防呆圖示 (人物) -->
                        <div id="char-fallback" class="absolute inset-0 flex flex-col items-center justify-center text-center hidden z-0">
                            <span id="char-fallback-emoji" class="text-7xl lg:text-9xl mb-4 opacity-50">🧍</span>
                            <span id="char-fallback-text" class="text-blue-800 font-bold bg-white/80 px-4 py-2 rounded-xl shadow-sm border border-blue-100">人物圖片載入中...<br><span class="text-sm text-gray-500">(請確認檔案已放置於同資料夾)</span></span>
                        </div>

                        <!-- 一開始無裝備的人物 (副檔名修正為 .png) -->
                        <img id="character-image" src="人物.png" class="w-full h-auto max-h-[60vh] object-contain rounded-2xl relative z-10 transition-opacity duration-300" alt="潛水角色" 
                            onerror="this.style.opacity='0'; document.getElementById('char-fallback').classList.remove('hidden');" 
                            onload="this.style.opacity='1'; document.getElementById('char-fallback').classList.add('hidden');" />
                    </div>

                    <!-- 動態產生的裝備清單 (作為學習確認用) -->
                    <div id="gear-list" class="flex flex-wrap gap-3 lg:gap-4 justify-center mt-8 w-full px-4">
                        <p class="text-gray-400 text-lg lg:text-xl font-bold">請於右側選擇潛水方式</p>
                    </div>
                </div>
                
                <!-- 選項區 (按鈕放大，適合觸控) -->
                <div class="flex flex-col gap-6 lg:gap-8 justify-center">
                    <!-- 浮潛按鈕 -->
                    <button onclick="pickDivingType('snorkeling')" class="group p-6 lg:p-8 border-4 border-blue-100 rounded-3xl hover:border-blue-400 hover:bg-blue-50 transition-all text-left shadow-sm hover:shadow-md">
                        <div class="text-2xl lg:text-3xl font-bold text-blue-800 flex items-center gap-3 mb-3">
                            <svg class="w-8 h-8 lg:w-10 lg:h-10" viewBox="0 0 24 24"><path d="M3 10 C3 7 21 7 21 10 L21 15 C21 18 12 18 12 14 C12 18 3 18 3 15 Z" fill="#0ea5e9" stroke="#0369a1" stroke-width="1.5"/></svg>
                            浮潛 (Snorkeling)
                        </div>
                        <p class="text-gray-600 tv-scale-text mb-4">穿戴救生衣與面鏡，輕鬆在水面欣賞珊瑚礁與海龜。</p>
                        
                        <div class="flex flex-wrap gap-3 mt-4">
                            <!-- 這裡使用獨立的 PNG 檔案 -->
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <img src="面鏡.png" class="w-8 h-8 object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span style="display:none; font-size:1.25rem;">🥽</span> 面鏡
                            </span>
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <img src="呼吸管.png" class="w-8 h-8 object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span style="display:none; font-size:1.25rem;">🎋</span> 呼吸管
                            </span>
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <img src="救生衣.png" class="w-8 h-8 object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span style="display:none; font-size:1.25rem;">🦺</span> 救生衣
                            </span>
                        </div>
                    </button>
                    
                    <!-- 深潛按鈕 -->
                    <button onclick="pickDivingType('scuba')" class="group p-6 lg:p-8 border-4 border-indigo-100 rounded-3xl hover:border-indigo-400 hover:bg-indigo-50 transition-all text-left shadow-sm hover:shadow-md">
                        <div class="text-2xl lg:text-3xl font-bold text-indigo-800 flex items-center gap-3 mb-3">
                            <svg viewBox="0 0 24 24" class="w-8 h-8 lg:w-10 lg:h-10"><rect x="7" y="6" width="10" height="15" rx="4" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/><rect x="9" y="3" width="6" height="3" fill="#9ca3af" stroke="#4b5563" stroke-width="1.5"/></svg>
                            深潛 (Scuba Diving)
                        </div>
                        <p class="text-gray-600 tv-scale-text mb-4">背負氣瓶進入深水區，與魚群共游，探索壯觀的海洋地形。</p>
                        
                        <div class="flex flex-wrap gap-3 mt-4">
                            <!-- 這裡使用獨立的 PNG 檔案 -->
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <img src="氣瓶.png" class="w-8 h-8 object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span style="display:none; font-size:1.25rem;">🛢️</span> 氣瓶
                            </span>
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <img src="BCD背心.png" class="w-8 h-8 object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" /><span style="display:none; font-size:1.25rem;">🎒</span> BCD背心
                            </span>
                            <span class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl text-sm lg:text-base font-bold border border-gray-200 shadow-sm text-slate-700">
                                <div class="w-8 h-8 rounded flex items-center justify-center"><svg viewBox="0 0 24 24" class="w-6 h-6"><path d="M6 4 L18 4 L18 20 L6 20 Z" fill="#475569"/><rect x="5" y="8" width="14" height="8" rx="1" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5"/><rect x="7" y="10" width="10" height="4" fill="#10b981"/></svg></div> 電腦錶
                            </span>
                        </div>
                    </button>

                    <button id="jump-btn" disabled onclick="executeJump()" class="mt-4 lg:mt-6 w-full py-5 lg:py-6 bg-gray-300 text-white rounded-2xl font-bold text-2xl lg:text-3xl cursor-not-allowed transition-all shadow-md">
                        請選擇潛水類型
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 海底場景 -->
    <div id="underwater-scene" class="hidden absolute inset-0 z-40 ocean-bg overflow-hidden">
        <!-- 泡泡動畫背景 -->
        <div class="absolute bottom-0 left-0 right-0 h-20 bg-blue-900/20 blur-xl"></div>
        
        <div class="absolute top-6 lg:top-10 left-6 lg:left-10 z-50 flex gap-4">
            <button onclick="backToSurface()" class="bg-white/20 hover:bg-white/40 text-white px-6 lg:px-8 py-3 lg:py-4 rounded-full backdrop-blur-md border border-white/30 transition-all font-bold text-lg lg:text-xl shadow-lg">
                ← 返回水面
            </button>
            <div class="bg-blue-950/40 text-white px-6 lg:px-8 py-3 lg:py-4 rounded-full backdrop-blur-md flex items-center gap-3 font-bold text-lg lg:text-xl shadow-lg">
                <span id="depth-text">準備中...</span>
            </div>
        </div>

        <div id="fish-container" class="w-full h-full relative">
            <!-- 魚會在這裡出現 -->
        </div>

        <!-- 魚類圖鑑 Modal -->
        <div id="fish-info-modal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[60] bg-white rounded-3xl p-8 lg:p-10 shadow-2xl max-w-2xl w-11/12 border-4 border-yellow-400 overflow-hidden">
            <div class="flex flex-col items-center">
                <div class="w-full h-56 lg:h-72 mb-6 rounded-2xl overflow-hidden bg-blue-100 relative shadow-inner flex items-center justify-center">
                    <img id="info-image" src="" alt="海洋生物" class="w-full h-full object-cover" onerror="this.style.display='none'; document.getElementById('info-image-fallback').style.display='flex';">
                    <div id="info-image-fallback" class="hidden flex-col items-center justify-center w-full h-full text-center bg-blue-50">
                        <!-- 動態防呆內容 -->
                    </div>
                </div>
                <h3 id="info-name" class="text-3xl lg:text-4xl font-bold text-blue-900 mb-4">熱帶魚名稱</h3>
                <div class="w-full max-h-[35vh] overflow-y-auto pr-4 mb-6 custom-scrollbar">
                    <p id="info-desc" class="text-gray-700 leading-relaxed text-left text-lg lg:text-xl whitespace-pre-line">描述資訊...</p>
                </div>
                <button onclick="closeFishInfo()" class="w-full py-4 lg:py-5 bg-blue-600 hover:bg-blue-700 transition-colors text-white rounded-2xl font-bold text-xl lg:text-2xl shadow-lg">了解更多 (關閉圖鑑)</button>
            </div>
        </div>
    </div>

    <!-- 跳水動畫用角色容器 -->
    <div id="jump-avatar" class="hidden absolute z-50 pointer-events-none w-48 md:w-64 lg:w-80 h-auto"></div>

</div>

<script>
    // 裝備圖示副檔名全面修正為 .png，並將按鈕尺寸大幅放大以看清裝備細節
    const imgIcons = {
        mask: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="面鏡.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🥽</span></div>`,
        snorkel: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="呼吸管.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🎋</span></div>`,
        lifeJacket: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="救生衣.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🦺</span></div>`,
        fins: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="蛙鞋.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🧜</span></div>`,
        tank: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="氣瓶.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🛢️</span></div>`,
        bcd: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner p-2 lg:p-3"><img src="BCD背心.png" class="w-full h-full object-contain blend-layer" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" /><span style="display:none; font-size:2.5rem;">🎒</span></div>`,
        computer: `<div class="w-20 h-20 lg:w-28 lg:h-28 rounded-2xl border-2 border-gray-200 bg-white flex items-center justify-center shrink-0 shadow-inner"><svg viewBox="0 0 24 24" class="w-12 h-12 lg:w-16 lg:h-16"><path d="M6 4 L18 4 L18 20 L6 20 Z" fill="#475569"/><rect x="5" y="8" width="14" height="8" rx="1" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5"/><rect x="7" y="10" width="10" height="4" fill="#10b981"/></svg></div>`
    };

    const gearConfigs = {
        'snorkeling': {
            items: [
                { id: 'mask', name: '面鏡', icon: imgIcons.mask },
                { id: 'snorkel', name: '呼吸管', icon: imgIcons.snorkel },
                { id: 'lifejacket', name: '救生衣', icon: imgIcons.lifeJacket },
                { id: 'fins', name: '蛙鞋', icon: imgIcons.fins }
            ]
        },
        'scuba': {
            items: [
                { id: 'tank', name: '氣瓶', icon: imgIcons.tank },
                { id: 'bcd', name: 'BCD背心', icon: imgIcons.bcd },
                { id: 'computer', name: '電腦錶', icon: imgIcons.computer },
                { id: 'maskfins', name: '面鏡與蛙鞋', icon: imgIcons.mask }
            ]
        }
    };

    // 升級生物資料庫：加入 emoji 與 shortName 作為圖片失效時的防呆辨識
    const fishes = [
        // --- 浮潛及皆可看見的物種 (水深 1-3M) ---
        { 
            name: '克氏雙鋸魚 (小丑魚)', 
            shortName: '小丑魚',
            emoji: '🐠',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Clown_fish_in_the_Andaman_Reef.jpg/500px-Clown_fish_in_the_Andaman_Reef.jpg', 
            type: 'snorkeling', 
            desc: '【學名】Amphiprion clarkii\n【特徵】身體有三條明顯的白色條紋。屬於「母系社會」，群體中體型最大的是雌魚，若雌魚死亡，最大的雄魚會性轉變為雌魚。\n【生態】與海葵互利共生。海葵的刺絲胞能保護小丑魚免受掠食者攻擊，而小丑魚則會幫海葵清理殘渣並趕走吃海葵的魚類。'

            type: 'snorkeling', 
            desc: '【學名】Chaetodon auriga\n【特徵】台灣珊瑚礁最普遍的蝶魚。體側有黑色線條交叉如「人」字，背鰭後方有一個明顯的「假眼斑」。\n【生態】假眼斑的功能是為了欺騙掠食者，讓敵人誤以為那是頭部而攻擊錯誤方向，藉此增加逃生的機會。主要以珊瑚蟲和小型無脊椎動物為食。' 
        },
        {

            emoji: '🪼',

            type: 'snorkeling', 
            desc: '【學名】Aurelia aurita\n【特徵】身體呈現半透明的圓盤狀，傘體中央有四個明顯的馬蹄形生殖腺（通常呈白色或粉紅色）。\n【生態】常隨著海流漂浮在淺水海域。雖然有刺絲胞，但毒性極弱，對人類通常無害，是許多海龜喜愛的食物。'

        { 
            name: '黑背蝶魚', 
            shortName: '黑背蝶',
            emoji: '🐟',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Chaetodon_melannotus_1.jpg/500px-Chaetodon_melannotus_1.jpg', 
            type: 'snorkeling', 
            desc: '【學名】Chaetodon melannotus\n【特徵】背部有大面積的黑色斑塊，眼睛部位有黑色條紋穿過，體側常有細緻的斜線。\n【生態】喜愛棲息在陽光充足的淺水鹿角珊瑚礁區，經常成雙成對地出現，主要啃食珊瑚蟲的水螅體。' 
        },
        { 
            name: '擬刺尾鯛 (藍倒吊)',

            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Paracanthurus_hepatus_%28Regal_Tang%29.jpg/500px-Paracanthurus_hepatus_%28Regal_Tang%29.jpg', 
            type: 'both', 
            desc: '【學名】Paracanthurus hepatus\n【特徵】因電影《海底總動員》的「多莉」而聞名。全身呈現鮮豔的湛藍色，搭配黑色紋路與亮黃色的尾鰭。\n【生態】屬於刺尾鯛科，牠們的尾柄兩側藏有如手術刀般鋒利的硬棘，遇到危險時會立起防禦，因此潛水時千萬不可隨意伸手觸摸，以免割傷。' 
        },
        { 
            name: '綠蠵龜', 
            shortName: '綠蠵龜',
            emoji: '🐢',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Green_sea_turtle_in_shallow_water.jpg/500px-Green_sea_turtle_in_shallow_water.jpg', 
            type: 'both', 
            desc: '【學名】Chelonia mydas\n【保育級別】瀕危物種 (Endangered)\n【特徵】成龜以海藻、海草為主食，由於體內累積了葉綠素，使得其脂肪呈現微綠色，因而得名。\n【生態】小琉球是台灣最容易目擊綠蠵龜的地點。觀察時須嚴格保持 5 公尺以上的安全距離，絕對禁止觸摸、追逐或投餵，違者將面臨野生動物保育法的重罰。' 
        },
        
        // --- 深潛專屬物種 (水深 10-25M) ---
        { 
            name: '青點鸚哥魚', 
            shortName: '鸚哥魚',
            emoji: '🐡',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Scarus_ghobban_Maldives.JPG/500px-Scarus_ghobban_Maldives.JPG', 
            type: 'scuba', 
            desc: '【學名】Scarus ghobban\n【特徵】牙齒癒合成像鸚鵡一樣的堅硬鳥喙狀。晚上睡覺時，會從口中吐出黏液結成透明的「防護繭」包覆全身，以防範掠食者和寄生蟲。\n【生態】珊瑚礁的「清道夫」。牠們會啃食附著在死珊瑚上的藻類，並將咬碎的珊瑚骨骼消化後排泄出來，這正是熱帶美麗白沙灘的重要來源之一。' 
        },
        { 
            name: '黑鰭礁鯊', 
            shortName: '礁鯊',
            emoji: '🦈',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Carcharhinus_melanopterus_1.jpg/500px-Carcharhinus_melanopterus_1.jpg', 
            type: 'scuba', 
            desc: '【學名】Carcharhinus melanopterus\n【特徵】各個魚鰭的末端都有明顯的黑色斑塊。體型偏小，通常體長不超過 1.6 公尺。\n【生態】偶爾可在蘭嶼或綠島的深水區見到。雖然名字裡有鯊魚，但牠們生性極度害羞且神經質，極少對人類造成威脅。牠們的存在是珊瑚礁生態系健康的指標。' 
        },
        { 
            name: '鬼蝠魟 (Manta)', 
            shortName: '鬼蝠魟',
            emoji: '🦇',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Manta_birostris-Thailand4.jpg/500px-Manta_birostris-Thailand4.jpg', 
            type: 'scuba', 
            desc: '【學名】Mobula birostris\n【保育級別】易危物種 (Vulnerable)\n【特徵】體型龐大，翼展可達 7 公尺以上。頭部前方有兩個類似角狀的頭鰭，用於引導水流與浮游生物進入大口中。\n【生態】性情非常溫和的深水濾食性動物。時常在海流強勁的礁岩區出現，會讓小魚（清潔魚）幫忙清理身上的寄生蟲，是潛水員夢寐以求的相遇。' 
        },
        { 
            name: '龍王鯛 (蘇眉魚)', 
            shortName: '龍王鯛',
            emoji: '🐋',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Cheilinus_undulatus_03.jpg/500px-Cheilinus_undulatus_03.jpg', 
            type: 'scuba', 
            desc: '【學名】Cheilinus undulatus\n【保育級別】瀕危物種 (Endangered)\n【特徵】世界上最大的隆頭魚，成魚額頭會明顯凸起，猶如拿破崙的帽子。體色呈鮮豔的藍綠色，並有複雜的網狀紋路。\n【生態】棲息於較深且陡峭的珊瑚礁斜坡。牠們喜歡吃有毒的棘冠海星，是維持珊瑚礁生態平衡的關鍵物種。台灣蘭嶼、綠島海域極為罕見。' 
        },
        { 
            name: '裸胸鯙 (海鰻)', 
            shortName: '海鰻',
            emoji: '🐍',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Moray_eel_in_Maldives.jpg/500px-Moray_eel_in_Maldives.jpg', 
            type: 'scuba', 
            desc: '【學名】Gymnothorax javanicus\n【特徵】身體修長如蛇，沒有胸鰭與腹鰭。平時會將長長的身體隱藏在礁石的縫隙中，只露出頭部。\n【生態】視力不佳，但嗅覺極其靈敏。牠們時常張開嘴巴呼吸，這並非要攻擊，而是在讓水流通過鰓部。白天大多休息，夜晚才會游出洞穴捕食。' 
        }
    ];

    let currentSpot = '';
    let currentDivingType = '';
    let equippedItems = new Set(); // 記錄目前已經確認的裝備

    function selectSpot(name) {
        currentSpot = name;
        document.getElementById('selected-spot-name').innerText = `準備前往：${name}`;
        document.getElementById('gear-modal').classList.remove('hidden');
        resetGear();
    }

    function closeGearModal() {
        document.getElementById('gear-modal').classList.add('hidden');
    }

    function resetGear() {
        currentDivingType = '';
        equippedItems.clear();
        
        // 重置為一開始沒有裝備的人物圖片 (修正為 .png)
        const charImg = document.getElementById('character-image');
        charImg.src = '人物.png';
        document.getElementById('char-fallback-emoji').innerText = '🧍';
        document.getElementById('char-fallback-text').innerHTML = '人物圖片載入中...<br><span class="text-sm text-gray-500">(請確認 人物.png 已下載)</span>';

        document.getElementById('gear-list').innerHTML = '<p class="text-gray-400 text-lg lg:text-xl font-bold">請於右側選擇潛水方式</p>';
        
        const btn = document.getElementById('jump-btn');
        btn.disabled = true;
        btn.classList.add('bg-gray-300', 'cursor-not-allowed');
        btn.classList.remove('bg-green-500', 'hover:bg-green-600', 'cursor-pointer', 'animate-pulse');
        btn.innerText = `請選擇潛水類型`;
    }

    function pickDivingType(type) {
        currentDivingType = type;
        equippedItems.clear();

        // 點選潛水類型後，人物維持未著裝的狀態 (人物.png)
        const charImg = document.getElementById('character-image');
        charImg.src = '人物.png';
        document.getElementById('char-fallback-emoji').innerText = '🧍';
        document.getElementById('char-fallback-text').innerHTML = '人物圖片載入中...<br><span class="text-sm text-gray-500">(請確認 人物.png 已下載)</span>';

        // 渲染角色下方的「裝備確認清單」，將裝備卡片放大讓學生看清楚細節
        const gearList = document.getElementById('gear-list');
        const config = gearConfigs[type];
        
        let html = '';
        config.items.forEach(item => {
            html += `
            <button id="btn-equip-${item.id}" onclick="equipItem('${item.id}')" class="relative flex flex-col items-center gap-2 lg:gap-3 bg-white p-3 lg:p-4 rounded-3xl text-base lg:text-xl font-bold shadow-md border-4 border-gray-100 text-slate-700 transition-all hover:scale-105 hover:border-blue-400">
                ${item.icon}
                <span>${item.name}</span>
                <div class="check-icon hidden absolute -top-3 -right-3 bg-green-500 rounded-full p-1.5 shadow-lg border-2 border-white text-white">
                    <svg class="w-5 h-5 lg:w-8 lg:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </button>`;
        });
        gearList.innerHTML = html;
        
        // 停用出發按鈕，提示需點擊裝備以確認學習
        const btn = document.getElementById('jump-btn');
        btn.disabled = true;
        btn.classList.add('bg-gray-300', 'cursor-not-allowed');
        btn.classList.remove('bg-green-500', 'hover:bg-green-600', 'cursor-pointer', 'animate-pulse');
        btn.innerText = `請點選下方圖示確認裝備清單`;
    }

    function equipItem(itemId) {
        if (equippedItems.has(itemId)) return;

        equippedItems.add(itemId);
        
        // 改變按鈕外觀，標示已確認
        const btn = document.getElementById(`btn-equip-${itemId}`);
        btn.classList.remove('bg-white', 'border-gray-100', 'text-slate-700', 'hover:scale-105', 'hover:border-blue-400');
        btn.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
        btn.querySelector('.check-icon').classList.remove('hidden');

        // 檢查是否所有裝備都已確認完畢
        if (equippedItems.size === gearConfigs[currentDivingType].items.length) {
            // 所有裝備都點擊確認後，人物切換為對應的著裝完畢圖片
            const charImg = document.getElementById('character-image');
            if (currentDivingType === 'snorkeling') {
                charImg.src = '浮潛.png';
                document.getElementById('char-fallback-emoji').innerText = '🤿';
                document.getElementById('char-fallback-text').innerHTML = '浮潛圖片載入中...<br><span class="text-sm text-gray-500">(請確認 浮潛.png 已下載)</span>';
            } else if (currentDivingType === 'scuba') {
                charImg.src = '深潛.png';
                document.getElementById('char-fallback-emoji').innerText = '🤿';
                document.getElementById('char-fallback-text').innerHTML = '深潛圖片載入中...<br><span class="text-sm text-gray-500">(請確認 深潛.png 已下載)</span>';
            }

            const jumpBtn = document.getElementById('jump-btn');
            jumpBtn.disabled = false;
            jumpBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
            jumpBtn.classList.add('bg-green-500', 'hover:bg-green-600', 'cursor-pointer', 'animate-pulse');
            jumpBtn.innerText = `裝備齊全，準備出發！`;
        }
    }

    function executeJump() {
        closeGearModal();
        
        const jumpContainer = document.getElementById('jump-avatar');
        
        // 複製現在的人物圖片到跳水動畫層
        const charImage = document.getElementById('character-image').cloneNode(true);
        charImage.removeAttribute('id');
        
        jumpContainer.innerHTML = '';
        jumpContainer.appendChild(charImage);
        
        jumpContainer.classList.remove('hidden');
        jumpContainer.style.left = '35%';
        jumpContainer.style.top = '30%';
        jumpContainer.classList.add('character-jump');

        setTimeout(() => {
            enterOcean();
            jumpContainer.classList.remove('character-jump');
            jumpContainer.classList.add('hidden');
        }, 1500);
    }

    function enterOcean() {
        document.getElementById('main-scene').classList.add('opacity-0');
        document.getElementById('underwater-scene').classList.remove('hidden');
        
        // 更新深潛/浮潛標示
        const depthText = currentDivingType === 'snorkeling' ? 
            `<svg viewBox="0 0 24 24" class="w-5 h-5 inline"><path d="M3 10 C3 7 21 7 21 10 L21 15 C21 18 12 18 12 14 C12 18 3 18 3 15 Z" fill="#0ea5e9" stroke="white" stroke-width="1.5"/></svg> 浮潛中 (水深 1-3M)` : 
            `<svg viewBox="0 0 24 24" class="w-5 h-5 inline"><rect x="7" y="6" width="10" height="15" rx="4" fill="#fbbf24" stroke="white" stroke-width="1.5"/></svg> 深潛中 (水深 10-25M)`;
        
        document.getElementById('depth-text').innerHTML = depthText;

        initOceanLife();
    }

    function backToSurface() {
        document.getElementById('underwater-scene').classList.add('hidden');
        document.getElementById('main-scene').classList.remove('opacity-0');
        document.getElementById('fish-container').innerHTML = '';
    }

    function initOceanLife() {
        const container = document.getElementById('fish-container');
        container.innerHTML = '';
        
        const visibleFishes = fishes.filter(f => f.type === currentDivingType || f.type === 'both');
        
        // 減少生物數量至 8 隻以內，避免畫面過於雜亂
        const fishCount = Math.floor(Math.random() * 3) + 6; // 產生 6 ~ 8 隻
        
        for (let i = 0; i < fishCount; i++) {
            const fishData = visibleFishes[Math.floor(Math.random() * visibleFishes.length)];
            createFish(fishData);
        }
    }

    function createFish(data) {
        const container = document.getElementById('fish-container');
        const fishEl = document.createElement('div');
        fishEl.className = 'fish-swim flex items-center justify-center rounded-full overflow-hidden border-2 border-white/50 bg-white/20 backdrop-blur-sm shadow-md';
        
        // 設定生物圖片的大小 (配合大螢幕，基礎尺寸放大為 100px ~ 180px)
        const size = Math.random() * 80 + 100;
        fishEl.style.width = `${size}px`;
        fishEl.style.height = `${size}px`;
        
        // 放入真實圖片
        const imgEl = document.createElement('img');
        imgEl.src = data.img;
        imgEl.className = 'w-full h-full object-cover';
        
        // 若圖片真的載入失敗，隱藏圖片並顯示專屬圖示與名稱 (防呆優化)
        imgEl.onerror = function() {
            this.style.display = 'none';
            fishEl.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full h-full bg-blue-900/60 p-2 text-center rounded-full">
                    <span class="text-4xl lg:text-5xl drop-shadow-md">${data.emoji}</span>
                    <span class="text-xs lg:text-sm font-bold text-white mt-1 leading-tight" style="text-shadow: 1px 1px 2px black;">${data.shortName}</span>
                </div>
            `;
        };
        
        fishEl.appendChild(imgEl);
        
        // 隨機決定產生位置 (上到下)
        const startY = Math.random() * 70 + 15;
        fishEl.style.top = `${startY}%`;

        // 隨機決定游動方向：50% 由左至右，50% 由右至左
        const isLeftToRight = Math.random() > 0.5;
        const speed = Math.random() * 15 + 15; // 速度 15s ~ 30s
        const delay = Math.random() * -20;     // 負延遲讓生物一開始就在畫面中不同位置

        if (isLeftToRight) {
            fishEl.style.animation = `swim-lr ${speed}s ease-in-out ${delay}s infinite`;
        } else {
            fishEl.style.animation = `swim-rl ${speed}s ease-in-out ${delay}s infinite`;
        }

        fishEl.onclick = () => showFishInfo(data);
        
        container.appendChild(fishEl);
    }

    function showFishInfo(data) {
        // 重置圖片顯示狀態 (預防前一次破圖導致隱藏)
        const imgEl = document.getElementById('info-image');
        const fallbackEl = document.getElementById('info-image-fallback');
        
        imgEl.style.display = 'block';
        fallbackEl.style.display = 'none';
        
        imgEl.src = data.img;
        
        // 同步更新圖鑑內的防呆畫面 (帶入該生物的名稱與圖示)
        fallbackEl.innerHTML = `
            <span class="text-6xl lg:text-8xl mb-4 opacity-80">${data.emoji}</span>
            <span class="text-blue-800 font-bold tracking-widest text-xl">⚠️ 圖片載入受限</span>
            <span class="text-gray-600 mt-2 font-bold text-lg">${data.name}</span>
        `;

        document.getElementById('info-name').innerText = data.name;
        document.getElementById('info-desc').innerText = data.desc;
        document.getElementById('fish-info-modal').classList.remove('hidden');
    }

    function closeFishInfo() {
        document.getElementById('fish-info-modal').classList.add('hidden');
    }
</script>
